name: Docker Image

on:
  # 推 main 后等 CI workflow 跑完再触发；CI 失败时这个 workflow 的 job 会被跳过。
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]
  # Tag push 视为已经过测试的发布，直接构建。
  push:
    tags: ["v*.*.*"]
  # 手动触发后门（用于救火 / 重发）。
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/nekroai/mihomo-hive

jobs:
  build:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest
    # workflow_run 触发时只在 CI 成功后继续；其他触发器（tag push / 手动）无条件构建。
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run 触发时 checkout 的是触发 CI 的那个 commit，
          # 确保发出去的镜像和已通过测试的代码完全一致。
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=main-
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
