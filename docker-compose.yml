services:
  mihomo-hive:
    image: ghcr.io/nekroai/mihomo-hive:latest
    container_name: mihomo-hive
    restart: unless-stopped
    network_mode: host
    environment:
      HIVE_HOST: "0.0.0.0"
      HIVE_PORT: "9990"
      HIVE_DATA_DIR: "/data"
      HIVE_GENERATED_DIR: "/data/generated"
      HIVE_CONFIG: "/data/hive.config.json"
      MIHOMO_BIN: "/usr/local/bin/mihomo"
    volumes:
      - ./runtime:/data
